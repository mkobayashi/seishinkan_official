name: Deploy to lolipop (production)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      # 既定は FTPS（ftp.lolipop.jp）。SSH/SFTP 契約がある場合は Repository variables 等で
      # LOLIPOP_TRANSFER_MODE=sftp とし、ホストを ssh.lolipop.jp に変更してください。
      - name: Deploy (lftp mirror)
        env:
          LOLIPOP_TRANSFER_MODE: ftps
          LOLIPOP_HOST: ${{ secrets.LOLIPOP_HOST }}
          LOLIPOP_USER: ${{ secrets.LOLIPOP_USER }}
          LOLIPOP_PASS: ${{ secrets.LOLIPOP_PASS }}
          LOLIPOP_REMOTE_DIR: ${{ secrets.LOLIPOP_REMOTE_DIR }}
        run: |
          bash deploy/lolipop_sync.sh

