name: Deploy to heteml (staging)

on:
  push:
    branches: [ "main" ]
    paths:
      - "about/**"
      - "class/**"
      - "css/**"
      - "en/**"
      - "entry/**"
      - "fonts/**"
      - "guidance/**"
      - "image/**"
      - "js/**"
      - "templates/**"
      - ".htaccess"
      - "index.php"
      - "favicon.ico"
      - "favicon-*.png"
      - "apple-touch-icon.png"
      - "android-chrome-*.png"
      - "browserconfig.xml"
      - "deploy/**"
      - ".github/workflows/deploy-heteml.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      # Secret HETEML_REMOTE_DIR は heteml 管理画面の「公開フォルダ」と同じ値（例: /web/seishinkan_official）
      - name: Deploy (FTP/FTPS mirror)
        env:
          HETEML_HOST: ${{ secrets.HETEML_HOST }}
          HETEML_USER: ${{ secrets.HETEML_USER }}
          HETEML_PASS: ${{ secrets.HETEML_PASS }}
          HETEML_REMOTE_DIR: ${{ secrets.HETEML_REMOTE_DIR }}
          # 任意: 530 のとき `ftps-allow` または `plain` を試す（未設定なら ftps-force）
          HETEML_FTP_MODE: ${{ secrets.HETEML_FTP_MODE }}
        run: |
          bash deploy/heteml_sync.sh

